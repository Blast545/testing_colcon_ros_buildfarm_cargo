%YAML 1.1
# Minimal buildfarm config — points at our local rosdistro fork on GitHub.
---
distributions:
  rolling:
    release_builds:
      default: rolling/release-build.yaml
jenkins_url: http://localhost:8080
notification_emails: []
prerequisites:
  debian_repositories: []
  debian_repository_keys: []
rosdistro_index_url: https://raw.githubusercontent.com/Blast545/testing_colcon_ros_buildfarm_cargo/main/configs/rosdistro/index-v4.yaml
status_page_repositories:
  default: []
type: buildfarm
version: 1
