%YAML 1.1
# Minimal release-build — single target ubuntu:resolute:amd64.
# `target_repository` is overridden at runtime by --package-import local.
---
abi_incompatibility_assumed: true
build_environment_variables: {}
notifications:
  emails: []
  maintainers: false
package_dependency_behavior:
  include_test_dependencies: false
  run_package_tests: false
sync:
  package_count: 1
  packages: [ros_tokio_demo]
repositories:
  keys: []
  urls: []
target_repository: http://localhost/ubuntu
targets:
  ubuntu:
    resolute:
      amd64:
type: release-build
version: 2
